name: Térképek Frissítése

on:
  schedule:
    # Minden vasárnap (0) éjjel 3:00-kor lefut
    - cron: '0 3 * * 0'
  workflow_dispatch: # Emiatt lesz egy manuális "Run" gomb

permissions:
  contents: write # Engedélyezzük, hogy a robot fájlokat módosítson a repóban

jobs:
  update-maps:
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: OSM to GeoJSON telepítése
        run: npm install osmtogeojson

      - name: Térképek letöltése és konvertálása
        run: node update-maps.js

      - name: Új térképek mentése a GitHubra
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Auto] Térképek heti frissítése"
          file_pattern: "data/*.json"
